server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — route all requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    # - wasm-unsafe-eval: required for PDF.js WebAssembly text rendering
    # - worker-src blob:: PDF.js spawns Web Workers from blob URLs
    # - img-src data: blob:: thumbnails are data: URLs; export uses blob: URLs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self';" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/wasm application/json image/svg+xml;
    gzip_min_length 1024;
}
